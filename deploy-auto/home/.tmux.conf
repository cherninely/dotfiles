# Load plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'    # one dark theme
set -g @plugin 'tmux-plugins/tmux-yank'        # Cross-platform support for clipboard.
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/Restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto Save/Restore

# Use Ctrl+A as the prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Restore using continuum
set -g @continuum-restore 'on'

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock

# Enable scroll, resize panes, select splits and windows by mouse
set -g mouse on

# Propagate terminal focus events to apps (Claude Code, nvim autoread, etc.)
set -g focus-events on

# Keep window numbers contiguous after closing.
set -g renumber-windows on

# Resize to the smallest client actually viewing the window, not the session.
setw -g aggressive-resize on

# Toggle mouse on with C-A m
bind m \
  set -g mouse on \;\
  display 'Mouse: ON'

# Toggle mouse off with C-A M for selecting normaly
bind M \
  set -g mouse off \;\
  display 'Mouse: OFF'

# Scroll History — large buffer for Claude Code diffs/logs/stacktraces.
set -g history-limit 100000

# Set first window to index 1 (not 0) to map more to the keyboard layout...
set -g base-index 1
setw -g pane-base-index 1

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Zero escape timing — fixes insert-mode exit lag in vim/nvim and Claude TUI.
set -s escape-time 0

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy and paste like in vim
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Reload tmux.conf on prexif+r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Use 256 colours.
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g default-terminal "screen-256color"

# Pass Shift+Enter and other extended keys through to apps (Claude Code, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g @onedark_widgets ""
set -g @onedark_date_format "%d/%m/%y"

# Make prefix + u maximize pane and prefix + i restore everything back, work shitty if you change window after
# pressing Down
unbind Up
unbind Down
bind Up new-window -d -n tmp \; swap-pane -s tmp.1 \; select-window -t tmp
bind Down last-window \; swap-pane -s tmp.1 \; kill-window -t tmp

# Do not rename window titles automatically
set-window-option -g automatic-rename off

# Set the name of the window initially, but then don't let tmux change it.
# The name can still be set at any time with Ctrl+B + ,
set-option -g allow-rename off

# Window activity/bell alerts.
# Claude Code emits BEL (\a) when generation finishes — catch it via monitor-bell.
# Activity would fire on every streamed chunk — too noisy, keep it off.
setw -g monitor-activity off
setw -g monitor-bell on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action other              # only alert for bells in inactive windows
set -g window-status-bell-style 'fg=red,bold,reverse'

# In choose-tree (prefix + s), mark sessions/windows with a pending bell using a red dot.
# choose-tree itself prepends "<name>: " to the format text, so we only render the suffix.
bind s choose-tree -Zs -F '#{?session_format,#{?session_alerts,#[bg=red,fg=white,bold] ● BELL #[default],}#{session_windows} windows#{?session_grouped, (group #{session_group}: #{session_group_list}),}#{?session_attached, (attached),},#{?window_format,#{?window_bell_flag,#[bg=red,fg=white,bold] ● BELL #[default],}#{window_panes} panes,#{pane_current_command}}}'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
